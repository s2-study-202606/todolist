<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>교사 로그인 / 학생 회원가입</h2>
        
        <div class="auth-forms">
            <!-- 교사 로그인 폼 -->
            <form id="login-form">
                <h3>교사 로그인</h3>
                <input type="email" id="login-email" placeholder="이메일" required>
                <input type="password" id="login-password" placeholder="비밀번호" required>
                <button type="submit">로그인</button>
            </form>

            <hr>

            <!-- 학생 회원가입 폼 -->
            <form id="signup-form">
                <h3>학생 회원가입</h3>
                <input type="email" id="signup-email" placeholder="이메일" required>
                <input type="password" id="signup-password" placeholder="비밀번호" required>
                <button type="submit">회원가입</button>
            </form>
        </div>
    </div>

    <script type="module" src="./src/firebase/config.js"></script>
    <script type="module" src="./src/auth/login.js"></script>
    <script type="module" src="./src/auth/signup.js"></script>
</body>
</html>
