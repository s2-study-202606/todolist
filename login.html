<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>교사 로그인 / 학생 회원가입</h2>
        
        <div class="auth-forms">
            <!-- 교사 로그인 폼 -->
            <form id="login-form">
                <h3>교사 로그인</h3>
                <input type="email" id="login-email" placeholder="이메일" required>
                <input type="password" id="login-password" placeholder="비밀번호" required>
                <button type="submit">로그인</button>
            </form>

            <hr>

            <!-- 학생 회원가입 폼 -->
            <form id="signup-form">
                <h3>학생 회원가입</h3>
                <input type="email" id="signup-email" placeholder="이메일" required>
                <input type="password" id="signup-password" placeholder="비밀번호" required>
                <button type="submit">회원가입</button>
            </form>
        </div>
    </div>

    <!-- 공통 모달 오버레이 (푸터 약관용) -->
    <div id="footer-modal-overlay" class="footer-modal-overlay hidden">
        <div class="footer-modal">
            <button id="close-footer-modal" class="close-modal-btn">X</button>
            <iframe id="footer-modal-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 권권권. All rights reserved. | <a href="#" id="btn-terms">이용약관</a> | <a href="#" id="btn-privacy">개인정보처리방침</a></p>
            <p>개인정보책임자: 권권권 교사 (잠실중학교) | 문의: 02-123-1234, test@tech.com</p>
        </div>
    </footer>

    <script type="module" src="./src/firebase/config.js"></script>
    <script type="module" src="./src/auth/login.js"></script>
    <script type="module" src="./src/auth/signup.js"></script>
    <script type="module" src="./src/todo/footer.js"></script>
</body>
</html>
